  function movingAverage(values, period) {
    return values.map((_, idx) => {
      if (idx + 1 < period) return null;
      const slice = values.slice(idx + 1 - period, idx + 1);
      return slice.reduce((a, b) => a + b, 0) / period;
    });
  }

  function rsi(values) {
    return values.map((_, idx) => {
      if (idx < 14) return 50;
      let gain = 0, loss = 0;
      for (let i = idx - 13; i <= idx; i++) {
        const diff = values[i] - values[i - 1];
        if (diff >= 0) gain += diff;
        else loss -= diff;
      }
      if (loss === 0) return 100;
      const rs = gain / loss;
      return 100 - (100 / (1 + rs));
    });
  }

  function candles(ticker="KRW-BTC", interval="minute60", count=120) {
    ticker = String(ticker || "KRW-BTC").toUpperCase();
    count = Math.max(30, Math.min(Number(count || 120), 160));
    const base = priceFor(ticker);
    const seed = [...ticker].reduce((sum, ch) => sum + ch.charCodeAt(0), 0);
    const closes = [];
    for (let i = 0; i < count; i++) {
      const wave = Math.sin((i + seed) / 8) * 0.026 + Math.cos((i + seed) / 17) * 0.014;
      const drift = (i - count * 0.62) / count * 0.038;
      closes.push(Math.round(base * (1 + wave + drift)));
    }
    closes[closes.length - 1] = base;
    return {
      ticker, interval, cached: true,
      closes,
      ma5: movingAverage(closes, 5),
      ma20: movingAverage(closes, 20),
      rsi: rsi(closes)

  }

    // 배포 스냅샷(또는 ai-live.js가 갱신한 최신 스냅샷)의 실데이터로 계산한다.

      preview: {

        estimated_fee: (side === "buy" ? krw : volume * price) * 0.0005,
        dry_run: true,
        min_order_krw: 5000,
      }
    };
  }

  function news() {
    const items = [
      ["CoinDesk", "Bitcoin holds range as traders watch macro liquidity", "시장 유동성과 위험선호 회복 여부가 단기 방향의 핵심 변수로 거론됩니다."],
      ["TokenPost", "솔라나 생태계 거래 활동 증가", "온체인 활동과 디앱 수수료 흐름이 다시 주목받고 있습니다."],
      ["Blockmedia", "가상자산 시장, 주요 알트코인 반등", "대형 코인 중심으로 변동성이 확대되는 모습입니다."],
      ["Cointelegraph", "Ethereum traders monitor ETF flows", "기관성 수급과 네트워크 지표가 함께 관찰되고 있습니다."],
    ].map((n, i) => ({
      source: n[0], publisher: n[0], title: n[1], summary: n[2],
      link: "https://github.com/seank007/stockagent",
      published: new Date(Date.now() - (i + 1) * 900000).toISOString(),
      relative_time: `${(i + 1) * 15}분 전`
    }));
    return {
      items, total_count: items.length,
      generated_at: now(),
      sources: ["Google KR", "Google Global", "Blockmedia", "TokenPost", "CoinDesk"].map((name, idx) => ({name, count: idx < 2 ? 2 : 1, ok: true})),
      errors: []
    };
  }

  function newsSummary() {
    return {
      headline: "대형 코인은 혼조, 시장은 유동성과 규제 신호를 대기",
      market_mood: "혼조",
      brief: ["비트코인은 박스권에서 방향성을 탐색 중입니다.", "솔라나와 이더리움은 생태계/수급 이슈가 함께 주목됩니다.", "공개 페이지에서는 실시간 뉴스 API 대신 데모 요약을 표시합니다."],
      key_assets: ["BTC", "ETH", "SOL", "XRP"],
      risks: ["높은 변동성", "거래소/규제 뉴스", "레버리지 청산"],
      watch: ["BTC 주요 가격대", "ETF/기관 수급", "온체인 활동"],
      source_note: "GitHub Pages 정적 데모 데이터",
      generated_at: now()
    };
  }

  function analyze(ticker) {
    const snap = {...candles(ticker, "minute60", 120), price: priceFor(ticker), rsi14: 54.8, trend: "up", period_change_pct: 1.2};
    return {
      snapshot: snap,
      cached: true,
      report: {
        summary: "GitHub Pages 공개 데모 분석입니다. 실제 AI 판단은 서버 배포에서 실행됩니다.",
        trend: "단기 추세는 완만한 반등으로 표시됩니다.",
        momentum: "RSI는 중립권이며 과열 신호는 제한적입니다.",
        support_resistance: "가상 지지/저항 구간을 데모로 표시합니다.",
        risks: "정적 페이지에서는 실시간 체결/계좌/API 호출이 없습니다.",
        watch: "실제 운영은 Flask 서버 배포 후 DRY_RUN 상태에서 먼저 검증하세요."
      }
    };
  }

  function route(path, params, init) {
    if (path === "/api/config") return {dry_run:true, allow_live_trading:false, provider:"mock", model:"github-pages-static", tickers:["KRW-BTC","KRW-SOL"], coin_markets:MARKETS, intervals:[{value:"minute15",label:"15분"},{value:"minute60",label:"1시간"},{value:"day",label:"일봉"}], risk:{max_order_krw:10000,min_order_krw:5000,max_daily_loss_krw:30000,min_confidence:0.6,cycle_seconds:600}};
    if (path === "/api/state") return state();
    if (path === "/api/pnl") return pnl();
    // ai-live.js가 window.__initialCoinPortfolio를 최신 스냅샷으로 바꿔치기하므로
    // 상수 대신 전역을 읽어 갱신이 전파되게 한다.
    if (path === "/api/portfolio") return clone(window.__initialCoinPortfolio || DEMO_PORTFOLIO);
    if (path === "/api/manual_portfolio") return {items:[]};
    if (path === "/api/manual_order/preview") return manualOrderPreview(init);
    if (path === "/api/manual_order") return {...manualOrderPreview(init), result:{dry_run:true}, portfolio: clone(DEMO_PORTFOLIO)};
    if (path === "/api/decisions") return {items:state().history};
    if (path === "/api/trades") {
      const snap = window.__aiTradeSnapshot || {};
      return {items: snap.trades || []};
    };
    if (path === "/api/candles") return candles(params.get("ticker") || "KRW-BTC", params.get("interval") || "minute60", params.get("count") || 120);
    if (path === "/api/stocks/candles") return candles(params.get("code") || "005930", params.get("timeframe") || "day", params.get("count") || 120);
    if (path === "/api/coin/quote") return {ticker:params.get("ticker") || "KRW-BTC", price:priceFor(params.get("ticker")), timestamp:now()};
    if (path === "/api/coin/orderbook") return orderbook(params.get("ticker") || "KRW-BTC");
    if (path === "/api/coin/mini_charts") {
      const tickers = (params.get("tickers") || MARKETS.map(m => m.market).join(",")).split(",").filter(Boolean).slice(0, 24);
      return {items:tickers.map(t => { const c = candles(t, params.get("interval") || "minute60", params.get("count") || 36); return {ticker:t, symbol:symbol(t), korean_name:(MARKETS.find(m=>m.market===t)||{}).korean_name || symbol(t), english_name:(MARKETS.find(m=>m.market===t)||{}).english_name || symbol(t), price:priceFor(t), change_pct:CHANGES[t] || 0, closes:c.closes, ok:true}; }), interval:params.get("interval") || "minute60", cached:true};
    }
    if (path === "/api/coin/news") return news();
    if (path === "/api/coin/news_summary") return newsSummary();
    if (path === "/api/stocks/quote") return {code:params.get("code") || "005930", name:"삼성전자", price:74200, change:800, change_pct:1.09, timestamp:now()};
    if (path === "/api/ticker_quotes") return {items:Object.keys(PRICES).slice(0, 6).map(t => ({sym:symbol(t), price:PRICES[t], chg_pct:CHANGES[t] || 0}))};
    if (path === "/api/analyze_context") return {ticker:params.get("ticker") || "KRW-BTC", holding:DEMO_PORTFOLIO.holdings[1], position:null, decisions:state().history, trades:[], portfolio_summary:DEMO_PORTFOLIO.summary};
    if (path === "/api/analyze") return analyze(params.get("ticker") || "KRW-BTC");
    return {};
  }

  const nativeFetch = window.fetch.bind(window);
  window.fetch = async (input, init={}) => {
    const raw = typeof input === "string" ? input : input.url;
    const url = new URL(raw, window.location.origin);
    const path = url.pathname.replace(/^\/stockagent/, "");
    if (path.startsWith("/api/")) {
      const body = JSON.stringify(route(path, url.searchParams, init));
      return new Response(body, {status:200, headers:{"Content-Type":"application/json; charset=utf-8"}});
    }
    return nativeFetch(input, init);
  };
})();
</script>

<script>

// 화면 배율 자동 조절: 창이 설계 폭(1360px)보다 넓으면 "절반 강도"로만 키운다.
// 예) 1440px→1.03, 2000px→1.24, 2560px→1.44 (최대 1.5 / 좁은 창·모바일 1배)
(function () {
  const DESIGN_WIDTH = 1360; // 레이아웃 1340px + 좌우 여백
  let t = null;
  function fitZoom() {
    if (!document.body) return;
    const fill = Math.max(0, window.innerWidth / DESIGN_WIDTH - 1);
    const z = Math.min(1.5, 1 + fill * 0.5);
    document.body.style.zoom = String(Math.round(z * 100) / 100);
  }
  window.addEventListener("resize", () => { clearTimeout(t); t = setTimeout(fitZoom, 120); });
  document.addEventListener("DOMContentLoaded", fitZoom);
  fitZoom();
})();

const KRW = (n, signed=false) => {
  if (n==null || isNaN(n)) return "—";
  const abs = Math.abs(n);
  let s;
  if (abs >= 100) s = Math.round(n).toLocaleString("ko-KR");
  else if (abs >= 1) s = n.toLocaleString("ko-KR", {maximumFractionDigits: 2});
  else s = n.toLocaleString("ko-KR", {maximumFractionDigits: 6});  // 1원 미만 코인(PEPE 등)
  return (signed && n>0 ? "+" : "") + s;
};
const PCT = (n, signed=true) => {
  if (n==null || isNaN(n)) return "—";
  return (signed && n>0 ? "+" : "") + n.toFixed(2) + "%";
};
const NUM = (n, digits=6) => {
  if (n==null || isNaN(n)) return "—";
  return Number(n).toLocaleString("ko-KR", {maximumFractionDigits: digits});
};
const colorOf = n => n>0 ? "up" : n<0 ? "down" : "muted";
function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  }[ch]));
}
function cleanReason(text, maxLen=150) {
  if (!text) return "—";
  const s = String(text);
  if (s.includes("RESOURCE_EXHAUSTED") || s.toLowerCase().includes("quota")) {
    return "AI 호출 한도 초과로 판단 생략. API 키/요금제 또는 AI_PROVIDER 설정을 확인하세요.";
  }
  if (s.includes("ClientError") && s.includes("429")) {
    return "AI 호출 한도 초과로 판단 생략. 잠시 후 다시 시도합니다.";
  }
  const compact = s.replace(/\s+/g, " ").trim();
  return compact.length > maxLen ? compact.slice(0, maxLen - 1) + "…" : compact;
}

// SVG 패스 생성: vals(배열) → svg 좌표 패스
function buildPath(vals, vw, vh, lov, hiv, pad=6) {
  if (!vals || vals.length===0) return "";
  let d = "", started = false;
  for (let i=0; i<vals.length; i++) {
    const v = vals[i];
    if (v==null || isNaN(v)) continue;
    const x = (i / (vals.length - 1)) * vw;
    const y = pad + (vh - 2*pad) * (1 - (v - lov) / (hiv - lov));
    d += (started ? "L" : "M") + x.toFixed(1) + " " + y.toFixed(1) + " ";
    started = true;
  }
  return d.trim();
}

function renderChart(svgPriceId, svgRsiId, data) {
  const closes = data.closes, ma5 = data.ma5, ma20 = data.ma20, rsi = data.rsi;
  const lo = Math.min(...closes.filter(v=>v!=null));
  const hi = Math.max(...closes.filter(v=>v!=null));
  const pad = (hi - lo) * 0.14 || 1;
  const L = lo - pad, H = hi + pad;
  const VW = 1000, VHp = 260, VHr = 90;

  const pricePath = buildPath(closes, VW, VHp, L, H);
  const ma5Path   = buildPath(ma5,    VW, VHp, L, H);
  const ma20Path  = buildPath(ma20,   VW, VHp, L, H);
  const areaPath  = pricePath ? pricePath + ` L ${VW} ${VHp} L 0 ${VHp} Z` : "";
  const rsiPath   = buildPath(rsi, VW, VHr, 0, 100, 5);

  document.getElementById(svgPriceId).innerHTML = `
    <path d="${areaPath}" fill="url(#gA-${svgPriceId})" opacity="0.5"></path>
    <path d="${ma20Path}" fill="none" stroke="#5a6577" stroke-width="1.5" vector-effect="non-scaling-stroke"></path>
    <path d="${ma5Path}"  fill="none" stroke="#e0b341" stroke-width="1.5" vector-effect="non-scaling-stroke"></path>
    <path d="${pricePath}" fill="none" stroke="#1fd6a8" stroke-width="2" vector-effect="non-scaling-stroke"></path>
    <defs><linearGradient id="gA-${svgPriceId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1fd6a8" stop-opacity="0.3"></stop>
      <stop offset="1" stop-color="#1fd6a8" stop-opacity="0"></stop>
    </linearGradient></defs>`;

  if (svgRsiId) {
    document.getElementById(svgRsiId).innerHTML = `
      <line x1="0" y1="27" x2="${VW}" y2="27" stroke="#2a1a1d" stroke-width="1" vector-effect="non-scaling-stroke"></line>
      <line x1="0" y1="63" x2="${VW}" y2="63" stroke="#1a2a22" stroke-width="1" vector-effect="non-scaling-stroke"></line>
      <path d="${rsiPath}" fill="none" stroke="#5aa3ff" stroke-width="1.6" vector-effect="non-scaling-stroke"></path>`;
  }

  return {
    lastClose: closes[closes.length-1],
    lastRsi: rsi[rsi.length-1],
    lastMa5: ma5[ma5.length-1],
    lastMa20: ma20[ma20.length-1],
    changePct: closes[0] ? (closes[closes.length-1]/closes[0] - 1) * 100 : 0,
  };
}

function applyTerminalHeader(s) {
  const isDry = (s.mode || "").includes("DRY");

}

function renderTickerTape(items) {
  const tape = document.getElementById("tape");
  if (!tape || !items || items.length === 0) return;
  const cell = it => {
    const col = it.chg_pct >= 0 ? "#1fd6a8" : "#ff5d6c";
    const sign = it.chg_pct >= 0 ? "+" : "";
    return `<span class="tape-cell">
      <span class="sym">${it.sym}</span>
      <span class="px">${KRW(it.price)}</span>
      <span style="color:${col};font-weight:600">${sign}${it.chg_pct.toFixed(2)}%</span>
    </span>`;
  };
  tape.innerHTML = items.map(cell).join("") + items.map(cell).join("");
}

async function loadTickerTape() {
  if (window._tapeLoading || document.hidden) return;
  window._tapeLoading = true;
  try {
    const j = await (await fetch("/api/ticker_quotes")).json();
    renderTickerTape(j.items || []);
  } catch(e) {}
  finally { window._tapeLoading = false; }
}

// AI Brain Logic
let lastBrainTs = null;
function initAiBrain() {
  const root = document.createElement("div");
  root.innerHTML = `
    <div id="ai-brain-bar">
      <div class="brain-icon">🧠</div>
      <div class="brain-text" id="ai-brain-text"><span style="color:#8a95a8;">AI 에이전트 대기 중...</span></div>
      <div style="font-size:10px; color:#5a6577;">[Click to Expand]</div>
    </div>
    <div id="ai-brain-panel"></div>
  `;
  const hd = document.querySelector(".hd");
  if (hd) {
    hd.parentNode.insertBefore(root, hd.nextSibling);
  } else {
    document.body.prepend(root);
  }
  document.getElementById("ai-brain-bar").addEventListener("click", () => {
    document.getElementById("ai-brain-panel").classList.toggle("open");
  });
  pollAiBrain();
  setInterval(pollAiBrain, 10000);
}

async function pollAiBrain() {
  try {
    const res = await fetch("/api/decisions?limit=5");
    const data = await res.json();
    if (!data.items || data.items.length === 0) return;
    const latest = data.items[0];
    if (latest.ts !== lastBrainTs) {
      lastBrainTs = latest.ts;
      const textEl = document.getElementById("ai-brain-text");
      const c = latest.action === "BUY" ? "#1fd6a8" : latest.action === "SELL" ? "#ff5d6c" : "#8a95a8";
      const a = latest.action === "BUY" ? "매수" : latest.action === "SELL" ? "매도" : "관망";
      textEl.innerHTML = `<span style="color:${c};font-weight:bold;">[${latest.ticker} ${a}]</span> <span class="typewriter-text" style="color:#e6ebf2;">${escapeHtml(latest.reasoning || "")}</span>`;
      
      document.getElementById("ai-brain-panel").innerHTML = data.items.map(item => {
        const ic = item.action === "BUY" ? "#1fd6a8" : item.action === "SELL" ? "#ff5d6c" : "#8a95a8";
        const ia = item.action === "BUY" ? "매수" : item.action === "SELL" ? "매도" : "관망";
        return `<div class="brain-log-item">
          <span style="color:#5a6577;font-family:monospace;">${(item.ts||"").split('T')[1] || item.ts}</span>
          <strong style="color:${ic}; margin:0 8px;">${item.ticker} ${ia}</strong>
          <span style="color:#e6ebf2;">${escapeHtml(item.reasoning || "")}</span>
        </div>`;
      }).join("");
    }
  } catch(e) {}
}
document.addEventListener("DOMContentLoaded", initAiBrain);

async function setBotPaused(paused) {
  const action = paused ? "pause" : "resume";
  if (!paused) {
    const mode = document.getElementById("mode-pill")?.textContent || "";
    if (mode.includes("LIVE") && !confirm("실거래 봇을 재개할까요?")) return;
  }
  try {
    const r = await fetch("/api/control", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ action }),
    });
    const s = await r.json();
    if (!r.ok) throw new Error(s.error || "control failed");
    applyTerminalHeader(s);
  } catch(e) {
    alert(e.message || e);
  }
}


const stockPresets = [{"code": "005930", "name": "삼성전자"}, {"code": "000660", "name": "SK하이닉스"}, {"code": "035420", "name": "NAVER"}, {"code": "005380", "name": "현대차"}, {"code": "035720", "name": "카카오"}];
const stockFrameLabel = { day:"일봉", week:"주봉", month:"월봉" };
window._stockFrame = "day";

function setupStockPresets() {
  const sel = document.getElementById("stock-preset");
  sel.innerHTML = stockPresets.map(s => `<option value="${s.code}">${s.name} · ${s.code}</option>`).join("");
  sel.value = "005930";
}

function setStockPreset(code) {
  document.getElementById("stock-code").value = code || "005930";
  loadStock();
}

function setStockFrame(frame) {
  window._stockFrame = frame;
  document.querySelectorAll("[data-stock-frame]").forEach(b => b.classList.toggle("on", b.dataset.stockFrame === frame));
  loadStock();
}

function stockCode() {
  return (document.getElementById("stock-code").value || "005930").replace(/\D/g, "").slice(0, 6) || "005930";
}

function renderStockQuote(q) {
  const change = Number(q.change || 0);
  const pct = q.change_pct == null ? null : Number(q.change_pct);
  document.getElementById("stock-price").textContent = q.price_text ? q.price_text + " 원" : KRW(q.price) + " 원";
  document.getElementById("stock-change").textContent =
    (q.change_text || KRW(change, true)) + (pct == null ? "" : ` (${PCT(pct)})`);
  document.getElementById("stock-change").className = "val " + colorOf(change);
  document.getElementById("stock-status").textContent = q.status || "—";
  document.getElementById("stock-updated").textContent = q.updated_at || "—";
  document.getElementById("stock-quote-rows").innerHTML = (q.rows || []).map(r => `
    <div class="quote-row">
      <span class="k">${r.label || "—"}</span>
      <span class="v">${r.value || "—"}</span>
    </div>
  `).join("");
  document.getElementById("stock-metric-rows").innerHTML = (q.metrics || []).map(r => `
    <div class="quote-row">
      <span class="k">${r.label || "—"}</span>
      <span class="v">${r.value || "—"}</span>
    </div>
  `).join("");
  const latest = (q.deal_trends || [])[0] || {};
  document.getElementById("stock-flow").textContent =
    latest.bizdate ? `개인 ${latest.individualPureBuyQuant || "—"} · 외국인 ${latest.foreignerPureBuyQuant || "—"} · 기관 ${latest.organPureBuyQuant || "—"}` : "—";
}

async function loadStock() {
  const code = stockCode();
  document.getElementById("stock-code").value = code;
  try {
    const quoteRes = await fetch(`/api/stocks/quote?code=${code}`);
    const quote = await quoteRes.json();
    if (!quoteRes.ok) throw new Error(quote.error || "주식 시세 조회 실패");
    renderStockQuote(quote);

    const chartRes = await fetch(`/api/stocks/candles?code=${code}&timeframe=${window._stockFrame}&count=140`);
    const chart = await chartRes.json();
    if (!chartRes.ok) throw new Error(chart.error || "주식 차트 조회 실패");
    const stats = renderChart("stockSvg", null, chart);
    document.getElementById("stock-chart-title").textContent =
      `${quote.name || code} · ${code} · ${stockFrameLabel[window._stockFrame]}`;
    document.getElementById("stock-rsi").textContent = stats.lastRsi != null ? stats.lastRsi.toFixed(1) : "—";
  } catch(e) {
    const err = document.getElementById("err");
    err.style.display = "block";
    err.textContent = e.message || e;
  }
}

async function tickStockState() {
  try {
    const s = await (await fetch("/api/state")).json();
    applyTerminalHeader(s);
  } catch(e) {}
}

setupStockPresets(); loadStock(); tickTape(); tickStockState();
setInterval(tickTape, 15000);
setInterval(tickStockState, 3000);
setInterval(loadStock, 30000);
