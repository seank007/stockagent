name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run tests
        env:
          DRY_RUN: "true"
          ALLOW_LIVE_TRADING: "false"
          AI_PROVIDER: mock
        run: python -m pytest -q
