services:
  stockagent:
    build: .
    container_name: stockagent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/stockagent.db
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
      AUTO_OPEN_BROWSER: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
